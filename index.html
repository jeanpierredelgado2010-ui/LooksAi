<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LooksAI</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #030406;
            --card-bg: #0b0d13;
            --accent-ai: #c084fc;
            --accent-water: #3b82f6;
            --accent-gym: #ef4444;
            --accent-success: #10b981;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow-x: hidden; min-height: 100vh;
        }

        .selfie-bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: linear-gradient(to bottom, rgba(5, 6, 8, 0.85), rgba(5, 6, 8, 0.98)), url('https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=600');
            background-size: cover; background-position: center; opacity: 0.15;
        }

        .main-content { padding: 16px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .app-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 60px; }

        header h1 {
            font-size: 1.8rem; margin: 15px 0 5px 0; font-weight: 900; text-align: center; letter-spacing: 2px;
            text-transform: uppercase; background: linear-gradient(45deg, #ffffff, var(--accent-ai));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .card { background-color: var(--card-bg); border-radius: 24px; padding: 22px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .card h2 { font-size: 0.85rem; margin-top: 0; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-weight: 700; }

        .auth-input { width: 100%; padding: 14px; background: #151922; border: 1px solid var(--border-color); border-radius: 12px; color: white; margin-bottom: 12px; font-size: 0.95rem; outline: none; }
        .auth-input:focus { border-color: var(--accent-ai); }
        .auth-toggle-text { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 14px; cursor: pointer; }
        .auth-toggle-text span { color: var(--accent-ai); font-weight: bold; }

        .photo-container { width: 100%; background: rgba(21, 25, 34, 0.6); border: 2px dashed #334155; border-radius: 16px; padding: 40px 20px; text-align: center; position: relative; overflow: hidden; }
        .preview-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; display: none; position: relative; z-index: 1; }
        .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #94a3b8; pointer-events: none; }
        #file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }

        .btn { color: white; border: none; padding: 16px 20px; border-radius: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-ai { background-color: #7c3aed; margin-top: 16px; }
        .btn-save-progress { background-color: var(--accent-success); margin-top: 14px; display: none; }

        .ai-response { margin-top: 16px; padding: 16px; background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.2); border-radius: 14px; font-size: 0.95rem; line-height: 1.5; display: none; color: #e2e8f0; white-space: pre-wrap; }
        .ai-response b { color: #ffffff; font-weight: 800; display: block; margin-top: 12px; margin-bottom: 4px; font-size: 1rem; }

        .route-window { display: none; }

        /* AGUA */
        .water-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 8px; }
        .water-glass { background: #151922; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px 0; text-align: center; font-size: 1.3rem; cursor: pointer; }
        .water-glass.active { background: rgba(59, 130, 246, 0.2); border-color: var(--accent-water); }

        /* CHECKLIST */
        .checklist-container { display: flex; flex-direction: column; gap: 8px; }
        .check-item { display: flex; align-items: center; justify-content: space-between; background: #151922; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border-color); }

        /* CRONOLOGÍA */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-day { background: #151922; border: 1px solid var(--border-color); aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.85rem; cursor: pointer; }
        .calendar-day.has-data { border-color: var(--accent-ai); }
        .calendar-day .score-tag { font-size: 0.65rem; color: var(--accent-success); font-weight: bold; }

        /* MENU SIDEBAR */
        .sidebar-toggle { position: fixed; right: 12px; top: 20px; z-index: 100; background: var(--card-bg); border: 1px solid var(--border-color); width: 44px; height: 44px; border-radius: 12px; display: none; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; }
        .sidebar-drawer { position: fixed; top: 0; right: -260px; width: 250px; height: 100%; background-color: #0b0d13; border-left: 1px solid var(--border-color); z-index: 99; transition: right 0.3s ease; padding: 80px 20px 20px 20px; display: flex; flex-direction: column; gap: 12px; }
        .sidebar-drawer.open { right: 0; }
        .nav-option { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #151922; border: 1px solid transparent; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .nav-option.active { border-color: var(--accent-ai); color: var(--accent-ai); }
        .update-photo-section { margin-top: 24px; padding-top: 18px; border-top: 1px dashed var(--border-color); }
    </style>
</head>
<body>

<div class="selfie-bg-overlay"></div>
<div class="sidebar-toggle" id="menu-btn" onclick="toggleSidebar()">☰</div>

<div class="sidebar-drawer" id="sidebar">
    <div class="nav-option" id="opt-plan" onclick="navigateTo('plan')"><span>🎯</span><span>Plan de Ajuste</span></div>
    <div class="nav-option" id="opt-inicio" onclick="navigateTo('inicio')"><span>📸</span><span>Escanear Rostro</span></div>
    <div class="nav-option" id="opt-cronologia" onclick="navigateTo('cronologia')"><span>📈</span><span>Cronología</span></div>
    <div class="nav-option" style="margin-top: auto; border-color: var(--accent-gym);" onclick="logoutUser()"><span>🚪</span><span>Cerrar Sesión</span></div>
</div>

<div class="app-layout">
    <div class="main-content">
        <div class="app-container">
            <header><h1>LooksAI</h1></header>

            <!-- VENTANA: LOGIN / REGISTRO CLOUD -->
            <div id="win-auth" class="route-window" style="display: block;">
                <div class="card">
                    <h2 id="auth-title">Iniciar Sesión</h2>
                    <input type="email" id="auth-email" class="auth-input" placeholder="Correo electrónico">
                    <input type="password" id="auth-password" class="auth-input" placeholder="Contraseña">
                    <button class="btn" style="background-color: var(--accent-ai);" id="btn-auth-submit" onclick="handleAuth()">Entrar</button>
                    <p class="auth-toggle-text" id="auth-toggle" onclick="toggleAuthMode()">¿No tienes cuenta? <span>Regístrate aquí</span></p>
                </div>
            </div>

            <!-- VENTANA: PLAN DE AJUSTE ESTÉTICO -->
            <div id="win-plan" class="route-window">
                <div class="card">
                    <h2>🎯 Plan de Ajuste Estético</h2>
                    <div class="checklist-container">
                        <label class="check-item"><span>💆 Masaje Facial</span><input type="checkbox" id="chk-1"></label>
                        <label class="check-item"><span>☀️ Skincare</span><input type="checkbox" id="chk-2"></label>
                        <label class="check-item"><span>🥗 Cero Sodio</span><input type="checkbox" id="chk-3"></label>
                    </div>
                    <br>
                    <label id="water-count-txt">0 / 10 Vasos</label>
                    <div class="water-grid">
                        <div class="water-glass" onclick="toggleWater(1)">💧</div>
                        <div class="water-glass" onclick="toggleWater(2)">💧</div>
                        <div class="water-glass" onclick="toggleWater(3)">💧</div>
                        <div class="water-glass" onclick="toggleWater(4)">💧</div>
                        <div class="water-glass" onclick="toggleWater(5)">💧</div>
                    </div>
                    <br>
                    <button class="btn" style="background-color:var(--accent-ai);" onclick="finalizeDayMetrics()">🏁 Archivar Métricas</button>

                    <div class="update-photo-section">
                        <button class="btn" style="background-color: #1e293b; border: 1px solid #334155;" onclick="navigateTo('inicio')">🔄 Actualizar Foto / Nuevo Escaneo</button>
                    </div>
                </div>
            </div>

            <!-- VENTANA: ESCANEAR FOTO -->
            <div id="win-inicio" class="route-window">
                <div class="card">
                    <h2>Escanear Rostro</h2>
                    <div class="photo-container">
                        <input type="file" id="file-input" accept="image/*" onchange="loadPhoto(event)">
                        <img id="preview" class="preview-img" alt="Tu Selfie">
                        <div id="placeholder" class="upload-placeholder">
                            <span>📸</span><strong>Tómate una Selfie para Escanear</strong>
                        </div>
                    </div>
                    <button class="btn btn-ai" id="btn-scan" onclick="analyzePhotoWithAI()">✨ Comenzar Escaneo</button>
                    <div id="ai-output" class="ai-response"></div>
                    <button class="btn btn-save-progress" id="btn-save-progress" onclick="saveProgressAndGo()">💾 Guardar Progreso e Ir al Plan</button>
                </div>
            </div>

            <!-- VENTANA: CRONOLOGÍA -->
            <div id="win-cronologia" class="route-window">
                <div class="card">
                    <h2>📅 Historial de Evolución</h2>
                    <div class="calendar-grid" id="calendar-element"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { GoogleGenAI } from "https://esm.run/@google/genai";

    const firebaseConfig = {
        apiKey: "AIzaSyCimB0_YUk_UgZamavoATZ38Q4C1J6Rh80",
        authDomain: "looksai-da317.firebaseapp.com",
        projectId: "looksai-da317",
        storageBucket: "looksai-da317.firebasestorage.app",
        messagingSenderId: "399828623248",
        appId: "1:399828623248:web:bc1684564c8d7ba1571d15"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const API_KEY = "AQ.Ab8RN6JrYB9krnwQNsua1mzUWr4SnG9Ur06Z3Y2pI7TXjVs9fQ";
    const ai = new GoogleGenAI({ apiKey: API_KEY });
    
    let base64Image = null;
    let isSignUpMode = false;
    let currentUser = null;

    window.toggleAuthMode = function() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "Crear Cuenta" : "Iniciar Sesión";
        document.getElementById('btn-auth-submit').innerText = isSignUpMode ? "Registrarse" : "Entrar";
    }

    window.handleAuth = async function() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        try {
            if(isSignUpMode) {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Cuenta creada correctamente.");
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }
        } catch (error) { alert("Error: " + error.message); }
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('menu-btn').style.display = 'flex';
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if(docSnap.exists() && docSnap.data().hasPhoto) { navigateTo('plan'); } 
            else { navigateTo('inicio'); }
        } else {
            currentUser = null;
            document.getElementById('menu-btn').style.display = 'none';
            document.querySelectorAll('.route-window').forEach(win => win.style.display = 'none');
            document.getElementById('win-auth').style.display = 'block';
        }
    });

    window.logoutUser = function() { signOut(auth); }

    window.loadPhoto = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = "block";
            document.getElementById('placeholder').style.display = "none";
            base64Image = e.target.result.split(',')[1];
        }
        reader.readAsDataURL(file);
    }

    window.analyzePhotoWithAI = async function() {
        const outputDiv = document.getElementById('ai-output');
        if (!base64Image) return alert("Sube una foto primero.");
        outputDiv.style.display = "block"; outputDiv.innerHTML = "Analizando facciones...";
        
        try {
            const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: [
                    { inlineData: { mimeType: "image/jpeg", data: base64Image } },
                    `Actúa como un estratega implacable de estética y looksmaxxing. Analiza esta foto facial de forma ultra directa y sincera. REGLAS: 1. PROHIBIDO caracteres de asteriscos (*). 2. Subtemas obligatorios estrictos en mayúsculas usando HTML: <b>⚠️ LO QUE TE AFECTA</b>, <b>⚡ LO QUE DEBE SER / ACCIONES HOY</b>, <b>🏁 CONCLUSIÓN</b>.`
                ]
            });
            outputDiv.innerHTML = response.text;
            document.getElementById('btn-save-progress').style.display = "flex";
            localStorage.setItem('tempAiScore', Math.floor(Math.random() * 25) + 70);
        } catch (error) { outputDiv.innerHTML = "Error de conexión."; }
    }

    window.saveProgressAndGo = async function() {
        if(currentUser) { await setDoc(doc(db, "users", currentUser.uid), { hasPhoto: true }, { merge: true }); }
        navigateTo('plan');
    }
</script>

<script>
    let currentGlasses = 0;
    let loggedHistory = localStorage.getItem('looksAiHistory') ? JSON.parse(localStorage.getItem('looksAiHistory')) : {};

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function navigateTo(windowId) {
        document.getElementById('sidebar').classList.remove('open');
        document.querySelectorAll('.route-window').forEach(win => win.style.display = 'none');
        if(document.getElementById('win-' + windowId)) document.getElementById('win-' + windowId).style.display = 'block';
        if(windowId === 'cronologia') renderCalendar();
    }

    function toggleWater(glassNum) {
        currentGlasses = glassNum;
        document.getElementById('water-count-txt').innerText = `${currentGlasses} / 10 Vasos`;
    }

    function finalizeDayMetrics() {
        const todayStr = new Date().getDate();
        loggedHistory[todayStr] = { day: todayStr, score: localStorage.getItem('tempAiScore') || "85", water: currentGlasses };
        localStorage.setItem('looksAiHistory', JSON.stringify(loggedHistory));
        alert("Guardado."); navigateTo('cronologia');
    }

    function renderCalendar() {
        const container = document.getElementById('calendar-element'); container.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            let cell = `<div>${i}</div>`;
            if (loggedHistory[i]) cell += `<div class="score-tag">${loggedHistory[i].score}%</div>`;
            container.innerHTML += `<div class="calendar-day ${loggedHistory[i]?'has-data':''}">${cell}</div>`;
        }
    }
</script>
</body>
</html>
